image = "lmsysorg/sglang:v0.5.10"

mounts = [
  "/capstor/store/cscs/swissai/infra01/opentela-share:/opentelabin",
  "/capstor",
  "/iopsstor",
]

workdir = "/opt"

# NOTE THIS IS MISSING SLINGSHOT AND NETWORK CONFIG. WILL BE SLOW FOR >1 NODE!

[env]
# NCCL_DEBUG = "INFO"  # uncomment for debugging
# NCCL_DEBUG_SUBSYS = "INIT,NET"  # uncomment for debugging
# JIT DeepGEMM off by default (formerly forced off by the launcher); DeepEP
# models opt in via sglang_deepep.toml instead.
SGL_ENABLE_JIT_DEEPGEMM = "0"

[annotations]
com.hooks.aws_ofi_nccl.enabled = "true"
com.hooks.aws_ofi_nccl.variant = "cuda12"
