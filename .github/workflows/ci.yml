name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: mypy

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    env:
      CSCS_API_KEY: ${{ secrets.CSCS_API_KEY }}
      FIRECREST_ACCOUNT: ${{ secrets.FIRECREST_ACCOUNT }}
      FIRECREST_CLIENT_ID: ${{ secrets.FIRECREST_CLIENT_ID }}
      FIRECREST_CLIENT_SECRET: ${{ secrets.FIRECREST_CLIENT_SECRET }}
      FIRECREST_PARTITION: ${{ secrets.FIRECREST_PARTITION }}
      FIRECREST_SYSTEM: ${{ secrets.FIRECREST_SYSTEM }}
      FIRECREST_TOKEN_URI: ${{ secrets.FIRECREST_TOKEN_URI }}
      FIRECREST_URL: ${{ secrets.FIRECREST_URL }}
      FIRECREST_USERNAME: ${{ secrets.FIRECREST_USERNAME }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov --cov-report=term-missing -n auto
