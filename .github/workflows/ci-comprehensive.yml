name: Comprehensive CI

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]

jobs:
  test-full:
    name: Tests (Python ${{ matrix.python-version }})
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'requires-full-tests')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    env:
      CSCS_API_KEY: ${{ secrets.CSCS_API_KEY }}
      FIRECREST_ACCOUNT: ${{ secrets.FIRECREST_ACCOUNT }}
      FIRECREST_CLIENT_ID: ${{ secrets.FIRECREST_CLIENT_ID }}
      FIRECREST_CLIENT_SECRET: ${{ secrets.FIRECREST_CLIENT_SECRET }}
      FIRECREST_PARTITION: ${{ secrets.FIRECREST_PARTITION }}
      FIRECREST_SYSTEM: ${{ secrets.FIRECREST_SYSTEM }}
      FIRECREST_TOKEN_URI: ${{ secrets.FIRECREST_TOKEN_URI }}
      FIRECREST_URL: ${{ secrets.FIRECREST_URL }}
      FIRECREST_USERNAME: ${{ secrets.FIRECREST_USERNAME }}
      RESERVATION: ${{ secrets.RESERVATION }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
      - run: pytest --cov --cov-report=term-missing -n 20 -m full
