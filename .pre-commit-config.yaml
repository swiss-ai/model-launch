repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run --frozen ruff check --fix
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: uv run --frozen ruff format
        language: system
        types: [python]
        pass_filenames: false

      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx markdownlint-cli2 --config .markdownlint.yaml
        language: system
        types: [markdown]
        exclude: ^legacy/

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        exclude: ^legacy/

      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: ^images/.*Dockerfile
        types_or: [dockerfile, file]

      - id: taplo
        name: taplo
        entry: taplo fmt
        language: system
        files: \.toml$
        exclude: ^legacy/

      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        files: \.(json|ya?ml)$
        exclude: ^legacy/

      - id: mypy
        name: mypy
        entry: make dmypy
        language: system
        types: [python]
        pass_filenames: false
