repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.yaml"]
        exclude: ^legacy/

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        exclude: ^legacy/

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        files: ^images/

  - repo: local
    hooks:
      - id: taplo
        name: taplo
        entry: taplo fmt
        language: system
        files: \.toml$
        exclude: ^legacy/

      - id: prettier
        name: prettier
        entry: npx prettier --write
        language: system
        files: \.(json|ya?ml)$
        exclude: ^legacy/

      - id: mypy
        name: mypy
        entry: make dmypy
        language: system
        types: [python]
        pass_filenames: false
