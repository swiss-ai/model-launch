site_name: Swiss AI Model Launch
site_description: CLI for launching LLMs on HPC clusters via SLURM or FirecREST.
site_url: https://swiss-ai.github.io/model-launch/
repo_url: https://github.com/swiss-ai/model-launch
repo_name: swiss-ai/model-launch
edit_uri: edit/main/docs/

docs_dir: docs

plugins:
  - search:
      pipeline:
        - trimmer
  - autorefs

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Initialization: initialization.md
  - Usage:
      - Interactive (sml): usage-sml.md
      - Advanced (sml advanced): usage-advanced.md
  - Performance:
      - Sizing a Model: sizing.md
      - Benchmarking: benchmarking.md
      - Loadtesting: loadtesting.md
  - MCP Server: mcp.md
  - Architecture: architecture.md
  - Development: development.md
  - CI/CD: ci-cd.md
  - FAQ: faq.md
  - Glossary: glossary.md

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - navigation.top
    - search.share
    - search.suggest
    - search.highlight
  icon:
    edit: material/pencil
  palette:
    # Auto mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

markdown_extensions:
  - admonition
  - def_list
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - markdown.extensions.smarty
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.blocks.caption
